<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D1B69"/>
      <stop offset="50%" style="stop-color:#4338CA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#22D3EE"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Z letterform with clip cut -->
  <g transform="translate(256,256)">
    <!-- Top bar -->
    <rect x="-120" y="-130" width="240" height="40" rx="6" fill="white" opacity="0.95"/>
    <!-- Diagonal with gap (clip motif) -->
    <rect x="-25" y="-100" width="50" height="105" rx="4" fill="white" opacity="0.95" transform="rotate(-56)"/>
    <!-- Clip gap glow -->
    <line x1="10" y1="-10" x2="50" y2="25" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
    <!-- Bottom bar -->
    <rect x="-120" y="90" width="240" height="40" rx="6" fill="white" opacity="0.95"/>
  </g>
</svg>
